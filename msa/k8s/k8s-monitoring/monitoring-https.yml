apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: monitoring-aws-eks-cloud-tls
  namespace: monitoring
spec:
  secretName: monitoring-aws-eks-cloud-tls
  duration: 2160h  		# 90d
  renewBefore: 360h  	# 15d
  issuerRef:
    name: my-issuer
    kind: ClusterIssuer
  dnsNames:
  - prometheus.aws-eks.cloud
  - grafana.aws-eks.cloud